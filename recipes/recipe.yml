---
# yaml-language-server: $schema=https://schema.blue-build.org/recipe-v1.json
# image will be published to ghcr.io/<user>/<name>
name: fedora-cosmic-atomic-ewt
# description will be included in the image's metadata
description: Fedora Atomic Cosmic image customized to my personal needs

# the base image to build on top of (FROM) and the version tag to use
#base-image: ghcr.io/ublue-os/silverblue-main
base-image: quay.io/fedora-ostree-desktops/cosmic-atomic
image-version: 44 # latest is also supported if you want new updates ASAP

# module configuration, executed in order
# you can include multiple instances of the same module
modules:
  - type: files
    files:
      - source: system
        destination: / # copies files/system/* into your image's root folder /

  - type: dnf
    repos:
      copr:
        - aquacash5/nerd-fonts
    install:
      packages:
        - micro
        - nodejs
        - npm
        - python3
        - python3-pip
        - uv
        - vim
        - tmux
        - oh-my-posh
        - hack-nerd-fonts
        - git
        - gcc
        - gcc-c++
        - pkgconf
        - python3-devel
        - dbus-devel
        - ollama
        - clang
        - llvm
        - llvm-devel
        - mesa-libOpenCL-devel
        - ranger
        - make
        - rust
        - rustup
        - cargo
        # Docker packages (replacing podman)
        - docker-ce
        - docker-ce-cli
        - containerd.io
        - docker-buildx-plugin
        - docker-compose-plugin
        # Rootless Docker: per-user daemon.
        # The system docker.service is masked below; only the per-user
        # unit from docker-ce-rootless-extras is enabled.
        #
        # Note: newuidmap/newgidmap live in the main `shadow-utils`
        # package on Fedora 44 (no separate `uidmap` subpackage), and
        # `fuse-overlayfs` is already in the base image, so we don't
        # add them here. The image base already has both.
        - docker-ce-rootless-extras
        - libvirt
        - libvirt-daemon-config-network
        - libvirt-daemon-kvm
        - qemu-kvm
        - qemu
        - virt-manager
        - virt-install
        - virt-viewer
        - kubernetes-client
        - helm
        - nmap
        - nmap-ncat
        - wireshark
        - btop
        - iotop
        - iftop
        - nethogs
        - sysstat
        - strace
        - hwinfo
        #- tlp
        #- tlp-rdw
        - linuxconsoletools
        # android
        - waydroid
        - dkms
        # OCR
        - tesseract
        - tesseract-langpack-nld
        - net-tools
        - traceroute
        # monitoring
        - node-exporter
    remove:
      packages:
        - firefox
        - firefox-langpacks

  # Install Docker Desktop from RPM
  - type: rpm-ostree
    install:
      - https://desktop.docker.com/linux/main/amd64/docker-desktop-x86_64.rpm

  # Enable Docker service (rootless per-user; system dockerd is masked)
  - type: systemd
    system:
      enabled:
        - node_exporter.service
      masked:
        # Block the rootful system dockerd from ever starting. We want
        # rootless only; the per-user docker.service is generated on
        # demand by `dockerd-rootless-setuptool.sh install` (which the
        # user runs once after rebase -- see README), so it can't be
        # enabled at image-build time (it would live in the user's
        # home, not in /usr/lib/systemd/user/).
        - docker.service

  - type: default-flatpaks
    configurations:
      - notify: true
        scope: system
        install:
          - org.mozilla.firefox
          - com.github.tchx84.Flatseal
          - io.freetubeapp.FreeTube
          - dev.zed.Zed
          - io.github.zen_browser.zen
      - scope: user

  - type: script
    scripts:
      - setup-libvirt.sh

  - type: signing
