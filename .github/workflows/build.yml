name: bluebuild
on:
  schedule:
    - cron:
        "00 06 * * 1" # build at 06:00 UTC once a week
        # (20 minutes after last ublue images start building)
  push:
    paths-ignore: # don't rebuild if only documentation has changed
      - "**.md"

  pull_request:
  workflow_dispatch: # allow manually triggering builds

# Force every JavaScript action in this run to use Node 24.
# BlueBuild v1.11.1 transitively depends on docker/setup-buildx-action
# v4.1.0 and docker/setup-qemu-action v4.0.0, which are pinned to
# Node 20. GitHub flips the default to Node 24 on 2026-06-16, but
# opting in now silences the deprecation warning and unblocks anyone
# who runs the workflow between now and then. Safe to remove once
# BlueBuild releases a version that pins the docker/* actions at
# Node-24-compatible versions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  # only run one build at a time
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true
jobs:
  bluebuild:
    name: Build Custom Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      fail-fast: false # stop GH from cancelling all matrix builds if one fails
      matrix:
        recipe:
          # !! Add your recipes here
          - recipe.yml
    steps:
      - name: Build Custom Image
        uses: blue-build/github-action@v1.11.1
        with:
          recipe: ${{ matrix.recipe }}
          cosign_private_key: ${{ secrets.SIGNING_SECRET }}
          registry_token: ${{ github.token }}
          pr_event_number: ${{ github.event.number }}
          maximize_build_space: true
